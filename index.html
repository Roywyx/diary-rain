<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>治愈雨季 | 沉浸式日记空间</title>
    <!-- 引入字体与核心库 -->
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <!-- Quill 富文本编辑器样式 -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent-color: #a8dadc;
            --text-color: #f1faee;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            height: 100%; width: 100%;
            font-family: 'Noto Sans SC', sans-serif;
            color: var(--text-color);
            overflow: hidden;
            background: #1a1c2c;
        }

        /* --- 水波纹特效样式 --- */
        .ripple {
            position: fixed;
            border-radius: 50%;
            border: 2px solid var(--accent-color);
            background: rgba(168, 218, 220, 0.1);
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 9999;
            animation: ripple-out 0.8s ease-out forwards;
        }

        @keyframes ripple-out {
            from { width: 0; height: 0; opacity: 0.8; border-width: 3px; }
            to { width: 150px; height: 150px; opacity: 0; border-width: 1px; }
        }

        /* 背景层 */
        .bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('./imgs/wallpaper.png');
            background-size: cover; background-position: center; z-index: -2;
        }
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); z-index: -1;
        }
        .rain-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        
        /* 雨滴样式 */
        .rain-drop {
            position: absolute; 
            background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.6));
            width: 1px; 
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-120px); opacity: 0; }
            20% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(105vh); opacity: 0; }
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        /* 内容区布局 */
        .main-container {
            position: relative; z-index: 10; max-width: 800px; margin: 0 auto;
            padding: 40px 20px; height: 100vh; display: flex; flex-direction: column;
        }

        .header h1 {
            font-family: 'Ma Shan Zheng', cursive; text-align: center;
            font-size: clamp(2.5rem, 8vw, 4.2rem); margin-bottom: 40px;
            text-shadow: 0 4px 20px rgba(0,0,0,0.6); letter-spacing: 5px;
        }

        .diary-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 25px; padding-bottom: 100px; }
        .diary-card { padding: 30px; position: relative; transition: transform 0.3s ease; }
        .diary-card:hover { transform: translateY(-5px); background: rgba(255, 255, 255, 0.12); }
        .card-meta { display: flex; gap: 12px; margin-bottom: 15px; font-size: 0.8rem; opacity: 0.6; align-items: center; }
        
        .diary-preview-content { font-size: 1rem; line-height: 1.8; opacity: 0.9; max-height: 120px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; }
        .diary-preview-content blockquote { border-left: 3px solid var(--accent-color); padding-left: 10px; margin: 10px 0; font-style: italic; opacity: 0.8; }

        /* --- Quill 编辑器样式重写 --- */
        .ql-container.ql-snow { border: none !important; font-size: 1.1rem; font-family: inherit; color: white; }
        .ql-toolbar.ql-snow { 
            border: none !important; border-bottom: 1px solid var(--glass-border) !important; 
            background: rgba(255,255,255,0.05); border-radius: 12px 12px 0 0;
        }
        .ql-snow .ql-stroke { stroke: rgba(255,255,255,0.6) !important; }
        .ql-snow .ql-fill { fill: rgba(255,255,255,0.6) !important; }
        .ql-snow .ql-picker { color: rgba(255,255,255,0.6) !important; }
        #editor-container { height: 350px; background: rgba(255,255,255,0.02); border-radius: 0 0 12px 12px; }

        /* 模态框样式 */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 2000;
        }
        .modal.active { display: flex; }
        .modal-body { width: 95%; max-width: 850px; padding: 40px; max-height: 95vh; overflow-y: auto; }
        .modal-body input#diary-title { 
            width: 100%; background: none; border: none; color: white; outline: none;
            font-family: 'Ma Shan Zheng', cursive; font-size: 2.5rem; border-bottom: 1px solid var(--glass-border);
            padding-bottom: 10px; margin-bottom: 30px;
        }

        .todo-panel {
            position: fixed; top: 25px; right: 25px; width: 280px; z-index: 1000; padding: 20px;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .todo-panel.folded { width: 50px; height: 50px; padding: 0; border-radius: 25px; cursor: pointer; }

        .fab-left {
            position: fixed; bottom: 35px; left: 35px; background: var(--accent-color); color: #1a1a2e;
            border: none; width: 65px; height: 65px; border-radius: 35px; display: flex; align-items: center; justify-content: center;
            z-index: 100; box-shadow: 0 10px 25px rgba(0,0,0,0.5); cursor: pointer; transition: 0.3s;
        }
        .fab-left:hover { width: 160px; }
        .fab-left span { display: none; margin-left: 10px; font-weight: 600; white-space: nowrap; }
        .fab-left:hover span { display: inline; }

        .music-toggle {
            position: fixed; bottom: 35px; right: 35px; width: 50px; height: 50px; border-radius: 25px;
            display: flex; align-items: center; justify-content: center; z-index: 100; transition: 0.3s;
            cursor: pointer;
        }

        .selector { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 25px; }
        .option { 
            width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;
            border-radius: 12px; background: rgba(255,255,255,0.05); cursor: pointer; transition: 0.2s;
        }
        .option.active { background: var(--accent-color); color: #1a1a2e; transform: scale(1.1); }

        /* 隐藏删除按钮 */
        .delete-btn { display: none !important; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="bg-layer"></div>
    <div class="overlay"></div>
    <div class="rain-container" id="rain-bg"></div>

    <!-- 右上角 Todo -->
    <aside class="todo-panel glass" id="todo-sidebar" onclick="if(this.classList.contains('folded')) toggleTodo()">
        <div class="todo-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h3 style="font-size: 0.9rem; opacity: 0.8; font-weight: 400;">今日便签</h3>
            <button onclick="event.stopPropagation(); toggleTodo()" style="background:none; border:none; color:white; cursor:pointer;">
                <i data-lucide="chevron-right" id="fold-icon"></i>
            </button>
        </div>
        <div class="todo-content">
            <input type="text" id="todo-input" placeholder="回车添加..." style="width:100%; background:rgba(255,255,255,0.05); border:none; padding:10px; color:white; border-radius:10px; outline:none;" onkeypress="if(event.key==='Enter') addTodo()">
            <div id="todo-list" style="max-height: 200px; overflow-y: auto; margin-top: 10px;"></div>
        </div>
    </aside>

    <!-- 居中区 -->
    <div class="main-container">
        <header class="header">
            <h1>听雨落的声音</h1>
            <p id="date-text" style="text-align: center; opacity: 0.5; font-size: 0.9rem; letter-spacing: 2px;"></p>
        </header>
        <div class="diary-list" id="diary-grid"></div>
    </div>

    <!-- 控制 -->
    <button class="fab-left" onclick="openEditor()">
        <i data-lucide="pen-tool"></i>
        <span>写日记</span>
    </button>

    <div class="music-toggle glass" onclick="toggleMusic()" style="position: fixed; bottom: 35px; right: 35px; width: 50px; height: 50px; border-radius: 25px; display: flex; align-items: center; justify-content: center;">
        <i data-lucide="volume-x" id="music-icon"></i>
    </div>

    <audio id="bg-audio" loop>
        <source src="./musics/rain1.mp3" type="audio/mpeg">
    </audio>

    <!-- 外部库 -->
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- 编辑器模态框 -->
    <div class="modal" id="modal">
        <div class="modal-body glass">
            <input type="text" id="diary-title" placeholder="起个诗意的标题...">
            
            <div id="edit-notice" style="font-size: 0.8rem; color: var(--accent-color); margin-bottom: 10px; display: none; opacity: 0.7;">管理模式：当前仅供预览</div>
            
            <div style="font-size: 0.8rem; opacity: 0.5; margin-bottom: 10px;">天气与心情</div>
            <div class="selector" id="weather-sel">
                <div class="option" data-val="sun" title="晴"><i data-lucide="sun"></i></div>
                <div class="option" data-val="cloud" title="多云"><i data-lucide="cloud"></i></div>
                <div class="option active" data-val="rain" title="雨"><i data-lucide="cloud-rain"></i></div>
                <div class="option" data-val="lightning" title="雷雨"><i data-lucide="cloud-lightning"></i></div>
                <div class="option" data-val="snow" title="雪"><i data-lucide="cloud-snow"></i></div>
                <div class="option" data-val="moon" title="星夜"><i data-lucide="moon"></i></div>
            </div>

            <div class="selector" id="mood-sel">
                <div class="option active" data-val="smile" title="欢愉"><i data-lucide="smile"></i></div>
                <div class="option" data-val="heart" title="热爱"><i data-lucide="heart"></i></div>
                <div class="option" data-val="coffee" title="恬静"><i data-lucide="coffee"></i></div>
                <div class="option" data-val="zap" title="触动"><i data-lucide="zap"></i></div>
                <div class="option" data-val="frown" title="微凉"><i data-lucide="frown"></i></div>
            </div>

            <!-- 富文本容器 -->
            <div id="editor-container"></div>
            
            <div style="display:flex; justify-content:flex-end; gap:20px; align-items:center; margin-top: 30px;">
                <button onclick="closeEditor()" style="background:none; border:none; color:white; opacity:0.5; cursor:pointer;">取消</button>
                <button id="save-diary-btn" class="save-btn glass" onclick="saveDiary()" style="background: var(--accent-color); color: #1a1a2e; border: none; padding: 12px 35px; border-radius: 30px; font-weight: 600; cursor: pointer;">镌刻这段记忆</button>
            </div>
        </div>
    </div>

    <script>
        // --- 初始化 Quill 富文本编辑器 ---
        const quill = new Quill('#editor-container', {
            theme: 'snow',
            modules: {
                toolbar: [
                    ['bold', 'italic', 'underline', 'strike'],
                    [{ 'header': 1 }, { 'header': 2 }],
                    ['blockquote', 'code-block'],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    ['clean']
                ]
            },
            placeholder: '写下此刻的所思所想...'
        });

        // --- 水波纹特效 ---
        window.addEventListener('mousedown', (e) => {
            const ripple = document.createElement('div');
            ripple.className = 'ripple';
            ripple.style.left = e.clientX + 'px';
            ripple.style.top = e.clientY + 'px';
            document.body.appendChild(ripple);
            ripple.addEventListener('animationend', () => ripple.remove());
        });

        // --- 核心业务与数据库 ---
        const SUPABASE_URL = 'https://fmhiflncdtdfykdmllhc.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZtaGlmbG5jZHRkZnlrZG1sbGhjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3ODAwNzQsImV4cCI6MjA5MDM1NjA3NH0.LJolOqN0QVlCdfGNhGh7nm7O-4hi8uuwtkUw4yCs5-Q';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let diaries = [];
        let editingId = null;
        let curWeather = 'rain';
        let curMood = 'smile';
        let isMusicPlaying = false;
        let todos = JSON.parse(localStorage.getItem('todos')) || [];

        async function fetchDiaries() {
            const { data, error } = await supabaseClient
                .from('diaries')
                .select('*')
                .order('timestamp', { ascending: false });
            if (error) return;
            diaries = data || [];
            renderDiaries();
        }

        function createRain() {
            const container = document.getElementById('rain-bg');
            container.innerHTML = ''; 
            const count = 65; 
            for (let i = 0; i < count; i++) {
                const drop = document.createElement('div');
                drop.className = 'rain-drop';
                drop.style.left = Math.random() * 100 + 'vw';
                drop.style.height = Math.random() * 40 + 30 + 'px';
                const duration = Math.random() * 0.6 + 0.6;
                drop.style.animationDuration = duration + 's';
                const delay = Math.random() * -5; 
                drop.style.animationDelay = delay + 's';
                container.appendChild(drop);
            }
        }

        // 修改编辑器打开逻辑：禁止编辑已有日记
        function openEditor(id = null) {
            editingId = id;
            const saveBtn = document.getElementById('save-diary-btn');
            const notice = document.getElementById('edit-notice');
            const titleInput = document.getElementById('diary-title');

            if(id) {
                // 编辑模式 -> 设为只读
                const d = diaries.find(x => x.id === id);
                titleInput.value = d.title;
                titleInput.readOnly = true;
                quill.root.innerHTML = d.content;
                quill.enable(false); // 禁止富文本编辑
                curWeather = d.weather; curMood = d.mood;
                
                saveBtn.style.display = 'none'; // 隐藏保存按钮
                notice.style.display = 'block'; // 显示预览提示
            } else {
                // 新建模式 -> 允许编辑
                titleInput.value = '';
                titleInput.readOnly = false;
                quill.setText(''); 
                quill.enable(true);
                curWeather = 'rain'; curMood = 'smile';
                
                saveBtn.style.display = 'block';
                notice.style.display = 'none';
            }
            
            document.querySelectorAll('#weather-sel .option').forEach(o => o.classList.toggle('active', o.dataset.val === curWeather));
            document.querySelectorAll('#mood-sel .option').forEach(o => o.classList.toggle('active', o.dataset.val === curMood));
            document.getElementById('modal').classList.add('active');
        }

        async function saveDiary() {
            // 如果是编辑模式，该函数不会被保存按钮触发，但做个双重检查
            if (editingId) return;

            const content = quill.root.innerHTML;
            if(quill.getText().trim().length === 0) return;
            
            const now = new Date();
            const data = {
                title: document.getElementById('diary-title').value || '无题的瞬间',
                content, 
                weather: curWeather, 
                mood: curMood,
                timestamp: now.getTime(),
                datestr: now.toLocaleDateString('zh-CN', { month: '2-digit', day: '2-digit', weekday: 'short' })
            };

            data.id = Date.now();
            await supabaseClient.from('diaries').insert([data]);
            
            closeEditor();
            fetchDiaries();
        }

        function renderDiaries() {
            const grid = document.getElementById('diary-grid');
            const iconsMap = { sun:'sun', cloud:'cloud', rain:'cloud-rain', lightning:'cloud-lightning', snow:'cloud-snow', moon:'moon', smile:'smile', heart:'heart', coffee:'coffee', zap:'zap', frown:'frown' };
            
            grid.innerHTML = diaries.map(d => `
                <div class="diary-card glass" onclick="openEditor(${d.id})">
                    <h3 style="font-size: 1.3rem; margin-bottom: 10px;">${d.title}</h3>
                    <div class="card-meta">
                        <i data-lucide="${iconsMap[d.weather] || 'cloud-rain'}" style="width:14px;"></i>
                        <i data-lucide="${iconsMap[d.mood] || 'smile'}" style="width:14px;"></i>
                        <span>${d.datestr || ''}</span>
                    </div>
                    <div class="diary-preview-content ql-editor" style="padding:0;">${d.content}</div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function toggleTodo() {
            document.getElementById('todo-sidebar').classList.toggle('folded');
            document.getElementById('fold-icon').style.transform = document.getElementById('todo-sidebar').classList.contains('folded') ? 'rotate(180deg)' : 'rotate(0)';
        }

        function addTodo() {
            const input = document.getElementById('todo-input');
            if(!input.value.trim()) return;
            todos.push({ id: Date.now(), text: input.value.trim(), done: false });
            input.value = '';
            renderTodos();
        }

        function renderTodos() {
            localStorage.setItem('todos', JSON.stringify(todos));
            const list = document.getElementById('todo-list');
            list.innerHTML = todos.map(t => `
                <div class="todo-item ${t.done ? 'done' : ''}" style="display: flex; align-items: flex-start; gap: 10px; margin-top: 12px; font-size: 0.9rem;">
                    <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTodoDone(${t.id})" style="margin-top: 4px; cursor: pointer;">
                    <span class="todo-text" style="flex: 1; word-break: break-all; outline: none; ${t.done ? 'text-decoration: line-through; opacity: 0.5;' : ''}">${t.text}</span>
                    <i data-lucide="x" style="width:14px; opacity:0.3; cursor:pointer;" onclick="todos=todos.filter(x=>x.id!==${t.id});renderTodos()"></i>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function toggleTodoDone(id) {
            todos = todos.map(t => t.id === id ? {...t, done: !t.done} : t);
            renderTodos();
        }

        function toggleMusic() {
            const audio = document.getElementById('bg-audio');
            const icon = document.getElementById('music-icon');
            if (isMusicPlaying) { audio.pause(); icon.setAttribute('data-lucide', 'volume-x'); }
            else { audio.play().catch(()=>{}); icon.setAttribute('data-lucide', 'volume-2'); }
            isMusicPlaying = !isMusicPlaying;
            lucide.createIcons();
        }

        function closeEditor() { document.getElementById('modal').classList.remove('active'); }

        document.querySelectorAll('.option').forEach(opt => {
            opt.addEventListener('click', () => {
                // 如果是编辑已有日记，点击天气/心情图标无效
                if (editingId) return;
                opt.parentElement.querySelectorAll('.option').forEach(o => o.classList.remove('active'));
                opt.classList.add('active');
                if(opt.parentElement.id === 'weather-sel') curWeather = opt.dataset.val;
                else curMood = opt.dataset.val;
            });
        });

        window.onload = () => {
            createRain();
            renderTodos();
            fetchDiaries();
            lucide.createIcons();
            document.getElementById('date-text').innerText = new Date().toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
        }
    </script>
</body>
</html>
